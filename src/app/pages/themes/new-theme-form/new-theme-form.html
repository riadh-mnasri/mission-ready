<form
  (ngSubmit)="submit()"
  class="card-shadow flex flex-col gap-4 border border-rule bg-card p-5"
>
  <input
    [(ngModel)]="name"
    name="themeName"
    [placeholder]="i18n.strings.themeNamePlaceholder"
    class="border border-rule bg-paper px-4 py-2.5 font-card text-ink placeholder:text-ink-faint focus:border-ink-blue focus:outline-none"
  />
  <div class="flex items-center gap-2">
    @for (c of colors; track c) {
      <button
        type="button"
        (click)="color.set(c)"
        class="h-7 w-7 rounded-full border-2 border-card transition-transform"
        [style.background]="c"
        [style.outline]="color() === c ? '2px solid ' + c : 'none'"
        [style.outline-offset.px]="2"
        [style.transform]="color() === c ? 'scale(1.1)' : 'scale(1)'"
      ></button>
    }
  </div>
  <button
    type="submit"
    class="stamp-button self-start border-2 border-ink-blue bg-card px-5 py-2 font-display text-sm font-bold tracking-wide text-ink-blue uppercase"
  >
    {{ i18n.strings.createTheme }}
  </button>
</form>

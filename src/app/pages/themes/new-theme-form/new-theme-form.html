<form
  (ngSubmit)="submit()"
  class="flex flex-col gap-4 rounded-xl border border-border bg-surface p-5"
>
  <input
    [(ngModel)]="name"
    name="themeName"
    [placeholder]="i18n.strings.themeNamePlaceholder"
    class="rounded-lg border border-border bg-bg px-3.5 py-2.5 text-sm text-text placeholder:text-text-faint focus:border-accent focus:outline-none"
  />
  <div class="flex items-center gap-2">
    @for (c of colors; track c) {
      <button
        type="button"
        (click)="color.set(c)"
        class="h-6 w-6 rounded-full transition-transform"
        [style.background]="c"
        [style.outline]="color() === c ? '2px solid ' + c : 'none'"
        [style.outline-offset.px]="2"
        [style.transform]="color() === c ? 'scale(1.1)' : 'scale(1)'"
      ></button>
    }
  </div>
  <button
    type="submit"
    class="self-start rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-accent-hover"
  >
    {{ i18n.strings.createTheme }}
  </button>
</form>

@if (!open()) {
  <button
    type="button"
    (click)="open.set(true)"
    class="w-full rounded-lg border border-dashed border-border py-2.5 text-sm text-text-muted transition-colors hover:border-accent/50 hover:text-accent"
  >
    {{ i18n.strings.addCard }}
  </button>
} @else {
  <form (ngSubmit)="submit()" class="space-y-3 rounded-lg border border-border bg-bg p-4">
    <textarea
      [(ngModel)]="question"
      name="question"
      [placeholder]="i18n.strings.questionPlaceholder"
      rows="2"
      class="w-full resize-none rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text placeholder:text-text-faint focus:border-accent focus:outline-none"
    ></textarea>
    <textarea
      [(ngModel)]="answer"
      name="answer"
      [placeholder]="i18n.strings.answerPlaceholder"
      rows="3"
      class="w-full resize-none rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text placeholder:text-text-faint focus:border-accent focus:outline-none"
    ></textarea>
    <div class="flex gap-2">
      <button
        type="submit"
        class="rounded-lg bg-accent px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-accent-hover"
      >
        {{ i18n.strings.save }}
      </button>
      <button
        type="button"
        (click)="open.set(false)"
        class="rounded-lg px-4 py-1.5 text-sm text-text-muted hover:text-text"
      >
        {{ i18n.strings.cancel }}
      </button>
    </div>
  </form>
}

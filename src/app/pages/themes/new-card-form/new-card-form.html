@if (!open()) {
  <button
    type="button"
    (click)="open.set(true)"
    class="w-full rounded-xl border border-dashed border-white/15 py-2.5 text-sm text-slate-400 hover:border-amber-400/40 hover:text-amber-300"
  >
    {{ i18n.strings.addCard }}
  </button>
} @else {
  <form (ngSubmit)="submit()" class="space-y-3 rounded-xl border border-white/10 bg-white/5 p-4">
    <textarea
      [(ngModel)]="question"
      name="question"
      [placeholder]="i18n.strings.questionPlaceholder"
      rows="2"
      class="w-full resize-none rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:border-amber-400/50 focus:outline-none"
    ></textarea>
    <textarea
      [(ngModel)]="answer"
      name="answer"
      [placeholder]="i18n.strings.answerPlaceholder"
      rows="3"
      class="w-full resize-none rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:border-amber-400/50 focus:outline-none"
    ></textarea>
    <div class="flex gap-2">
      <button
        type="submit"
        class="rounded-full bg-amber-400 px-4 py-1.5 text-sm font-semibold text-slate-900"
      >
        {{ i18n.strings.save }}
      </button>
      <button
        type="button"
        (click)="open.set(false)"
        class="rounded-full px-4 py-1.5 text-sm text-slate-400 hover:text-white"
      >
        {{ i18n.strings.cancel }}
      </button>
    </div>
  </form>
}

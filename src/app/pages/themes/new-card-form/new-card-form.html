@if (!open()) {
  <button
    type="button"
    (click)="open.set(true)"
    class="w-full border border-dashed border-rule py-2.5 font-card text-sm text-ink-muted hover:border-ink-blue hover:text-ink-blue"
  >
    {{ i18n.strings.addCard }}
  </button>
} @else {
  <form (ngSubmit)="submit()" class="space-y-3 border border-rule bg-paper p-4">
    <textarea
      [(ngModel)]="question"
      name="question"
      [placeholder]="i18n.strings.questionPlaceholder"
      rows="2"
      class="w-full resize-none border border-rule bg-card px-3 py-2 font-card text-sm text-ink placeholder:text-ink-faint focus:border-ink-blue focus:outline-none"
    ></textarea>
    <textarea
      [(ngModel)]="answer"
      name="answer"
      [placeholder]="i18n.strings.answerPlaceholder"
      rows="3"
      class="w-full resize-none border border-rule bg-card px-3 py-2 font-card text-sm text-ink placeholder:text-ink-faint focus:border-ink-blue focus:outline-none"
    ></textarea>
    <div class="flex gap-2">
      <button
        type="submit"
        class="stamp-button border-2 border-ink-blue bg-card px-4 py-1.5 font-display text-sm font-bold text-ink-blue uppercase"
      >
        {{ i18n.strings.save }}
      </button>
      <button
        type="button"
        (click)="open.set(false)"
        class="px-4 py-1.5 font-card text-sm text-ink-muted hover:text-ink"
      >
        {{ i18n.strings.cancel }}
      </button>
    </div>
  </form>
}

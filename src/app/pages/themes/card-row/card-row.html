@if (editing()) {
  <form (ngSubmit)="submit()" class="space-y-3 border border-rule bg-paper p-4">
    <textarea
      [(ngModel)]="draftQuestion"
      name="question"
      rows="2"
      class="w-full resize-none border border-rule bg-card px-3 py-2 font-card text-sm text-ink focus:border-ink-blue focus:outline-none"
    ></textarea>
    <textarea
      [(ngModel)]="draftAnswer"
      name="answer"
      rows="3"
      class="w-full resize-none border border-rule bg-card px-3 py-2 font-card text-sm text-ink focus:border-ink-blue focus:outline-none"
    ></textarea>
    <div class="flex gap-2">
      <button
        type="submit"
        class="stamp-button border-2 border-ink-blue bg-card px-4 py-1.5 font-display text-sm font-bold text-ink-blue uppercase"
      >
        {{ i18n.strings.save }}
      </button>
      <button
        type="button"
        (click)="editing.set(false)"
        class="px-4 py-1.5 font-card text-sm text-ink-muted hover:text-ink"
      >
        {{ i18n.strings.cancel }}
      </button>
    </div>
  </form>
} @else {
  <div class="border border-rule bg-paper p-4">
    <p class="font-card text-sm font-medium text-ink">{{ question() }}</p>
    <p class="mt-1 font-card text-sm text-ink-muted">{{ answer() }}</p>
    <div class="mt-3 flex gap-4">
      <button
        type="button"
        (click)="startEditing()"
        class="font-card text-xs font-medium text-ink-blue hover:text-ink-blue-light"
      >
        {{ i18n.strings.edit }}
      </button>
      <button
        type="button"
        (click)="delete.emit()"
        class="font-card text-xs font-medium text-stamp-red hover:text-stamp-red-light"
      >
        {{ i18n.strings.delete }}
      </button>
    </div>
  </div>
}

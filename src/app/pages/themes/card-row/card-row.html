@if (editing()) {
  <form (ngSubmit)="submit()" class="space-y-3 rounded-xl border border-white/10 bg-white/5 p-4">
    <textarea
      [(ngModel)]="draftQuestion"
      name="question"
      rows="2"
      class="w-full resize-none rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white focus:border-amber-400/50 focus:outline-none"
    ></textarea>
    <textarea
      [(ngModel)]="draftAnswer"
      name="answer"
      rows="3"
      class="w-full resize-none rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white focus:border-amber-400/50 focus:outline-none"
    ></textarea>
    <div class="flex gap-2">
      <button
        type="submit"
        class="rounded-full bg-amber-400 px-4 py-1.5 text-sm font-semibold text-slate-900"
      >
        {{ i18n.strings.save }}
      </button>
      <button
        type="button"
        (click)="editing.set(false)"
        class="rounded-full px-4 py-1.5 text-sm text-slate-400 hover:text-white"
      >
        {{ i18n.strings.cancel }}
      </button>
    </div>
  </form>
} @else {
  <div class="rounded-xl border border-white/5 bg-white/[0.03] p-4">
    <p class="text-sm font-medium text-white">{{ question() }}</p>
    <p class="mt-1 text-sm text-slate-400">{{ answer() }}</p>
    <div class="mt-3 flex gap-4">
      <button
        type="button"
        (click)="startEditing()"
        class="text-xs font-medium text-amber-300 hover:text-amber-200"
      >
        {{ i18n.strings.edit }}
      </button>
      <button
        type="button"
        (click)="delete.emit()"
        class="text-xs font-medium text-rose-400 hover:text-rose-300"
      >
        {{ i18n.strings.delete }}
      </button>
    </div>
  </div>
}

@if (editing()) {
  <form (ngSubmit)="submit()" class="space-y-3 rounded-lg border border-border bg-bg p-4">
    <textarea
      [(ngModel)]="draftQuestion"
      name="question"
      rows="2"
      class="w-full resize-none rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text focus:border-accent focus:outline-none"
    ></textarea>
    <textarea
      [(ngModel)]="draftAnswer"
      name="answer"
      rows="3"
      class="w-full resize-none rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text focus:border-accent focus:outline-none"
    ></textarea>
    <div class="flex gap-2">
      <button
        type="submit"
        class="rounded-lg bg-accent px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-accent-hover"
      >
        {{ i18n.strings.save }}
      </button>
      <button
        type="button"
        (click)="editing.set(false)"
        class="rounded-lg px-4 py-1.5 text-sm text-text-muted hover:text-text"
      >
        {{ i18n.strings.cancel }}
      </button>
    </div>
  </form>
} @else {
  <div
    [attr.data-card-id]="cardId()"
    [class]="
      highlighted()
        ? 'rounded-lg border border-accent bg-accent/10 p-4 transition-colors duration-500'
        : 'rounded-lg border border-border bg-bg p-4 transition-colors duration-500'
    "
  >
    <p class="text-sm font-medium text-text">{{ question() }}</p>
    <p class="mt-1 text-sm text-text-muted">{{ answer() }}</p>
    <div class="mt-3 flex gap-4">
      <button
        type="button"
        (click)="startEditing()"
        class="text-xs font-medium text-accent hover:text-accent-hover"
      >
        {{ i18n.strings.edit }}
      </button>
      <button
        type="button"
        (click)="delete.emit()"
        class="text-xs font-medium text-danger hover:text-danger-hover"
      >
        {{ i18n.strings.delete }}
      </button>
    </div>
  </div>
}

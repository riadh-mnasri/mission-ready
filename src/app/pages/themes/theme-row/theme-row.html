<div class="glass card-shadow overflow-hidden rounded-2xl">
  <button
    type="button"
    (click)="toggleExpand.emit()"
    class="flex w-full items-center justify-between gap-4 px-5 py-4 text-left"
  >
    <div class="flex items-center gap-3">
      <span class="h-3 w-3 rounded-full" [style.background]="theme().color"></span>
      <span class="font-semibold text-white">{{ i18n.themeName(theme()) }}</span>
      <span class="text-sm text-slate-400">{{ i18n.strings.cardsCount(cards().length) }}</span>
    </div>
    <div class="flex w-40 items-center gap-3">
      <app-mastery-bar [ratio]="mastery()" [color]="theme().color" />
    </div>
  </button>

  @if (expanded()) {
    <div class="animate-fade-up space-y-3 border-t border-white/5 p-5">
      @for (card of cards(); track card.id) {
        <app-card-row
          [question]="card.question"
          [answer]="card.answer"
          (save)="updateCard.emit({ cardId: card.id, question: $event.question, answer: $event.answer })"
          (delete)="deleteCard.emit(card.id)"
        />
      }

      <app-new-card-form (create)="addCard.emit($event)" />

      @if (theme().isCustom) {
        <button
          type="button"
          (click)="deleteTheme.emit()"
          class="mt-2 text-sm text-rose-400 hover:text-rose-300"
        >
          {{ i18n.strings.deleteTheme }}
        </button>
      }
    </div>
  }
</div>

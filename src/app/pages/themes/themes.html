<main class="mx-auto w-full max-w-3xl flex-1 px-6 py-10">
  <div class="mb-8 flex flex-wrap items-center justify-between gap-3">
    <h1 class="text-2xl font-semibold tracking-tight text-text">{{ i18n.strings.themesTitle }}</h1>
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="exportBackup()"
        class="rounded-lg border border-border px-3 py-2 text-sm font-medium text-text-muted transition-colors hover:border-accent/40 hover:text-text"
      >
        {{ i18n.strings.exportBackup }}
      </button>
      <button
        type="button"
        (click)="importInput.click()"
        class="rounded-lg border border-border px-3 py-2 text-sm font-medium text-text-muted transition-colors hover:border-accent/40 hover:text-text"
      >
        {{ i18n.strings.importBackup }}
      </button>
      <input
        #importInput
        type="file"
        accept="application/json"
        class="hidden"
        (change)="importBackup($event)"
      />
      <button
        type="button"
        (click)="newThemeOpen.set(!newThemeOpen())"
        class="rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-accent-hover"
      >
        {{ newThemeOpen() ? i18n.strings.cancel : i18n.strings.newTheme }}
      </button>
    </div>
  </div>

  @if (newThemeOpen()) {
    <div class="mb-6">
      <app-new-theme-form (create)="addTheme($event)" />
    </div>
  }

  <p class="mb-4 text-sm text-text-muted">{{ i18n.strings.selectThemesHint }}</p>

  @if (selectedThemeIds().size > 0) {
    <div
      class="card-shadow animate-fade-up mb-4 flex items-center justify-between gap-3 rounded-xl border border-accent/40 bg-surface px-5 py-3"
    >
      <button type="button" (click)="clearSelection()" class="text-sm text-text-muted hover:text-text">
        {{ i18n.strings.clearSelection }}
      </button>
      <button
        type="button"
        (click)="startFocusSession()"
        class="rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-accent-hover"
      >
        {{ i18n.strings.startFocusSession(selectedThemeIds().size) }}
      </button>
    </div>
  }

  <div class="space-y-3">
    @for (theme of themes(); track theme.id) {
      <app-theme-row
        [theme]="theme"
        [cards]="cardsForTheme(theme.id)"
        [expanded]="expandedThemeId() === theme.id"
        [selected]="selectedThemeIds().has(theme.id)"
        (toggleExpand)="toggleExpand(theme.id)"
        (toggleSelect)="toggleThemeSelection(theme.id, $event)"
        (addCard)="addCard(theme.id, $event)"
        (updateCard)="updateCard($event)"
        (deleteCard)="deleteCard($event)"
        (deleteTheme)="deleteTheme(theme.id)"
      />
    }
  </div>
</main>

<main class="mx-auto w-full max-w-3xl flex-1 px-6 py-10">
  <div class="mb-8 flex items-center justify-between">
    <h1 class="font-display text-2xl font-semibold text-ink">{{ i18n.strings.themesTitle }}</h1>
    <button
      type="button"
      (click)="newThemeOpen.set(!newThemeOpen())"
      class="stamp-button border-2 border-ink-blue bg-card px-5 py-2 font-display text-sm font-bold tracking-wide text-ink-blue uppercase"
    >
      {{ newThemeOpen() ? i18n.strings.cancel : i18n.strings.newTheme }}
    </button>
  </div>

  @if (newThemeOpen()) {
    <div class="mb-6">
      <app-new-theme-form (create)="addTheme($event)" />
    </div>
  }

  <div class="space-y-3">
    @for (theme of themes(); track theme.id) {
      <app-theme-row
        [theme]="theme"
        [cards]="cardsForTheme(theme.id)"
        [expanded]="expandedThemeId() === theme.id"
        (toggleExpand)="toggleExpand(theme.id)"
        (addCard)="addCard(theme.id, $event)"
        (updateCard)="updateCard($event)"
        (deleteCard)="deleteCard($event)"
        (deleteTheme)="deleteTheme(theme.id)"
      />
    }
  </div>
</main>

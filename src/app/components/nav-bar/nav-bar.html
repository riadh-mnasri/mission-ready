<header class="sticky top-0 z-20 border-b-2 border-ink-blue bg-card">
  <div class="mx-auto flex max-w-5xl items-end justify-between px-6 pt-4">
    <a routerLink="/" class="mb-3 flex items-center gap-3">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border-2 border-double border-ink-blue font-display text-sm font-semibold text-ink-blue"
      >
        MR
      </span>
      <span class="font-display text-xl font-semibold tracking-tight text-ink">MissionReady</span>
    </a>

    <div class="flex items-end gap-2">
      <nav class="flex items-end gap-1">
        <a
          routerLink="/"
          routerLinkActive="bg-paper text-ink-blue card-shadow"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-t-lg border border-b-0 border-rule px-4 py-2 text-sm font-medium text-ink-muted transition-colors hover:text-ink-blue"
        >
          {{ i18n.strings.navDashboard }}
        </a>
        <a
          routerLink="/themes"
          routerLinkActive="bg-paper text-ink-blue card-shadow"
          class="rounded-t-lg border border-b-0 border-rule px-4 py-2 text-sm font-medium text-ink-muted transition-colors hover:text-ink-blue"
        >
          {{ i18n.strings.navThemes }}
        </a>
      </nav>

      <button
        type="button"
        (click)="i18n.toggle()"
        class="stamp-button mb-2 flex h-8 w-8 items-center justify-center rounded-full border-2 border-stamp-red font-display text-xs font-bold text-stamp-red"
      >
        {{ i18n.language() === 'en' ? 'FR' : 'EN' }}
      </button>
    </div>
  </div>
</header>

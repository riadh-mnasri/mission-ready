<header class="sticky top-0 z-20 border-b border-white/5 bg-[#0b1120]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
    <a routerLink="/" class="flex items-center gap-2 text-lg font-bold tracking-tight">
      <span
        class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 text-slate-900 shadow-lg shadow-amber-500/20"
      >
        ⚡
      </span>
      MissionReady
    </a>

    <div class="flex items-center gap-3">
      <nav class="flex items-center gap-1 rounded-full border border-white/5 bg-white/5 p-1">
        <a
          routerLink="/"
          routerLinkActive="bg-amber-400 text-slate-900"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-4 py-1.5 text-sm font-medium text-slate-300 transition-colors hover:text-white"
        >
          {{ i18n.strings.navDashboard }}
        </a>
        <a
          routerLink="/themes"
          routerLinkActive="bg-amber-400 text-slate-900"
          class="rounded-full px-4 py-1.5 text-sm font-medium text-slate-300 transition-colors hover:text-white"
        >
          {{ i18n.strings.navThemes }}
        </a>
      </nav>

      <button
        type="button"
        (click)="i18n.toggle()"
        class="rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-sm font-semibold text-slate-300 transition-colors hover:text-white"
      >
        {{ i18n.language() === 'en' ? 'FR' : 'EN' }}
      </button>
    </div>
  </div>
</header>

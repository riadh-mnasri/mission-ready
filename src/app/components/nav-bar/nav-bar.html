<header class="sticky top-0 z-20 border-b border-border bg-bg/95 backdrop-blur">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
    <a routerLink="/" class="flex items-center gap-2.5">
      <span
        class="flex h-8 w-8 items-center justify-center rounded-lg bg-accent text-sm font-semibold text-white"
      >
        M
      </span>
      <span class="text-[15px] font-semibold tracking-tight text-text">MissionReady</span>
    </a>

    <div class="flex items-center gap-3">
      <nav class="flex items-center gap-1">
        <a
          routerLink="/"
          routerLinkActive="bg-surface text-text"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-md px-3 py-1.5 text-sm font-medium text-text-muted transition-colors hover:text-text"
        >
          {{ i18n.strings.navDashboard }}
        </a>
        <a
          routerLink="/themes"
          routerLinkActive="bg-surface text-text"
          class="rounded-md px-3 py-1.5 text-sm font-medium text-text-muted transition-colors hover:text-text"
        >
          {{ i18n.strings.navThemes }}
        </a>
      </nav>

      <button
        type="button"
        (click)="search.open()"
        class="flex items-center gap-2 rounded-md border border-border px-2.5 py-1.5 text-xs font-medium text-text-muted transition-colors hover:border-accent hover:text-text"
      >
        <span>{{ i18n.strings.search }}</span>
        <span class="rounded border border-border px-1 py-0.5 text-[10px] text-text-faint">⌘K</span>
      </button>

      <button
        type="button"
        (click)="i18n.toggle()"
        class="rounded-md border border-border px-2.5 py-1.5 text-xs font-medium text-text-muted transition-colors hover:border-accent hover:text-text"
      >
        {{ i18n.language() === 'en' ? 'FR' : 'EN' }}
      </button>
    </div>
  </div>
</header>

  <div class="h-1 flex-1 overflow-hidden rounded-full bg-border">
    <div
      class="h-full rounded-full transition-[width] duration-500"
      [style.width.%]="percent()"
      [style.background]="color()"
    ></div>
  </div>
  <span class="w-9 text-right text-xs text-text-muted">{{ percent() }}%</span>
</div>

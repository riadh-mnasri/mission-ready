@if (visible()) {
  <div class="animate-fade-up mx-auto mt-6 flex max-w-xl gap-3">
    <button
      type="button"
      (click)="missed.emit()"
      class="flex-1 rounded-2xl border border-rose-400/25 bg-rose-400/10 px-5 py-3.5 font-semibold text-rose-300 transition-colors hover:bg-rose-400/20"
    >
      {{ i18n.strings.iDidNotKnow }}
    </button>
    <button
      type="button"
      (click)="knew.emit()"
      class="flex-1 rounded-2xl bg-gradient-to-br from-emerald-400 to-emerald-600 px-5 py-3.5 font-semibold text-slate-950 shadow-lg shadow-emerald-500/20 transition-transform hover:scale-[1.02]"
    >
      {{ i18n.strings.iKnew }}
    </button>
  </div>
}

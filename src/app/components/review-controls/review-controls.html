@if (visible()) {
  <div class="animate-fade-up mx-auto mt-6 flex max-w-xl gap-4">
    <button
      type="button"
      (click)="missed.emit()"
      class="stamp-button -rotate-1 flex-1 border-2 border-stamp-red bg-card px-5 py-3.5 font-display text-sm font-bold tracking-wide text-stamp-red uppercase"
    >
      {{ i18n.strings.iDidNotKnow }}
    </button>
    <button
      type="button"
      (click)="knew.emit()"
      class="stamp-button rotate-1 flex-1 border-2 border-ink-blue bg-card px-5 py-3.5 font-display text-sm font-bold tracking-wide text-ink-blue uppercase"
    >
      {{ i18n.strings.iKnew }}
    </button>
  </div>
}

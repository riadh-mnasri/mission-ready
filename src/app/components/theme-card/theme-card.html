<a
  [routerLink]="['/review', theme().id]"
  class="card-shadow card-shadow-hover block rounded-xl border border-border bg-surface p-5 transition-[transform,box-shadow,border-color] duration-150 hover:-translate-y-0.5 hover:border-accent/40"
>
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-2.5">
      <span class="h-2 w-2 rounded-full" [style.background]="theme().color"></span>
      <h3 class="text-[15px] font-medium text-text">{{ i18n.themeName(theme()) }}</h3>
    </div>
    @if (due() > 0) {
      <span class="shrink-0 rounded-full bg-accent/15 px-2.5 py-0.5 text-xs font-medium text-accent">
        {{ i18n.strings.duePill(due()) }}
      </span>
    } @else {
      <span class="shrink-0 rounded-full bg-success/10 px-2.5 py-0.5 text-xs font-medium text-success">
        {{ i18n.strings.upToDatePill }}
      </span>
    }
  </div>

  <p class="mt-3 text-xs text-text-muted">{{ i18n.strings.cardsCount(cards().length) }}</p>

  <div class="mt-4">
    <app-mastery-bar [ratio]="mastery()" [color]="theme().color" />
  </div>
</a>

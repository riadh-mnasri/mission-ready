<a
  [routerLink]="['/review', theme().id]"
  [style.--tilt]="tilt() + 'deg'"
  class="tilt-card card-shadow card-shadow-hover block border border-rule bg-card p-5"
>
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-2.5">
      <span class="h-2.5 w-2.5 rounded-full border border-ink/20" [style.background]="theme().color"></span>
      <h3 class="font-display text-base font-semibold text-ink">{{ i18n.themeName(theme()) }}</h3>
    </div>
    @if (due() > 0) {
      <span
        class="shrink-0 -rotate-3 border-2 border-stamp-red px-2 py-0.5 font-display text-[0.65rem] font-bold tracking-wide text-stamp-red uppercase"
      >
        {{ i18n.strings.duePill(due()) }}
      </span>
    } @else {
      <span
        class="shrink-0 -rotate-3 border-2 border-tab-emerald px-2 py-0.5 font-display text-[0.65rem] font-bold tracking-wide text-tab-emerald uppercase"
      >
        {{ i18n.strings.upToDatePill }}
      </span>
    }
  </div>

  <p class="mt-3 font-card text-xs text-ink-muted">{{ i18n.strings.cardsCount(cards().length) }}</p>

  <div class="mt-4">
    <app-mastery-bar [ratio]="mastery()" [color]="theme().color" />
  </div>
</a>

<a
  [routerLink]="['/review', theme().id]"
  class="card-shadow card-shadow-hover glass block rounded-2xl p-5 transition-[transform,box-shadow] duration-200 hover:-translate-y-1"
>
  <div class="flex items-start justify-between">
    <div class="flex items-center gap-3">
      <span
        class="h-3 w-3 rounded-full"
        [style.background]="theme().color"
        [style.box-shadow]="'0 0 12px ' + theme().color"
      ></span>
      <h3 class="font-semibold text-white">{{ i18n.themeName(theme()) }}</h3>
    </div>
    @if (due() > 0) {
      <span class="rounded-full bg-amber-400/15 px-2.5 py-0.5 text-xs font-semibold text-amber-300">
        {{ i18n.strings.duePill(due()) }}
      </span>
    } @else {
      <span class="rounded-full bg-emerald-400/10 px-2.5 py-0.5 text-xs font-medium text-emerald-300">
        {{ i18n.strings.upToDatePill }}
      </span>
    }
  </div>

  <p class="mt-3 text-sm text-slate-400">{{ i18n.strings.cardsCount(cards().length) }}</p>

  <div class="mt-4">
    <app-mastery-bar [ratio]="mastery()" [color]="theme().color" />
  </div>
</a>
